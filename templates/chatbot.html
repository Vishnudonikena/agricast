<!-- Include marked.js for markdown parsing -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<!-- Floating chat button -->
<button id="chat-button" class="chat-button">
    <i class="fas fa-comments"></i>
</button>

<!-- Chat modal -->
<div id="chat-modal" class="chat-modal">
    <div class="chat-header">
        <h3>AgriPrice Assistant</h3>
        <button class="close-button">&times;</button>
    </div>
    <div class="chat-messages" id="chat-messages">
        <div class="message bot">
            Hello! I'm your AgriPrice Assistant. I can help you with:
            <ul>
                <li>Crop price predictions</li>
                <li>Market trends</li>
                <li>Crop information</li>
                <li>Price forecasts</li>
            </ul>
            Feel free to ask in any Indian language!
        </div>
    </div>
    <div class="chat-input">
        <button id="mic" class="voice-btn" title="Click to start/stop voice recording">
            <i class="fas fa-microphone"></i>
        </button>
        <input type="text" id="user-message" placeholder="Type your message here...">
        <button id="send-message">
            <i class="fas fa-paper-plane"></i>
        </button>
    </div>
    <!-- Voice output controls -->
    <div class="voice-controls">
        <button id="voice-stop" class="voice-control-btn" title="Stop voice playback" style="display: none;">
            <i class="fas fa-volume-mute"></i>
        </button>
        <div class="voice-status"></div>
    </div>
</div>
